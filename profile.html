/* GENERAL */
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
}




/* LEFT SIDE */
.user-profile-left{
  width:50%;
  background:#bfe1f8;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
}

.user-profile-company-logo{
  width:200px;
  margin-bottom:20px;
}

.user-profile-left h2{
  color:#047730;
  margin-bottom:10px;
  font-size:28px;
}

.user-profile-left p{
  font-size:20px;
  background:linear-gradient(to bottom,#0765f1 50%,#047730 50%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}


/* RIGHT SIDE */
.user-profile-right{
  width:50%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}


/* FORM CONTAINER */
.user-profileForm{
  width:100%;
  max-width:550px;
}


/* TITLE */
.user-profile-right h2{
  margin-bottom:25px;
  font-size:26px;
  color:#04803c;
  text-align:center;
}


/* PROFILE PHOTO */
.user-profile-photo{
  text-align:center;
  margin-bottom:20px;
}

.user-profile-photo img{
  width:100px;
  height:100px;
  border-radius:50%;
  display:block;
  margin:0 auto 10px auto;
}

.user-profile-photo input[type="file"]{
  display:block;
  margin:auto;
}


/* LABEL */
.user-profileForm label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
  font-weight:600;
  color:#000;
}


/* INPUT FIELDS */
.user-profile-right input,
.user-profile-right select{
  width:100%;
  height:40px;
  padding:8px 10px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:14px;
  margin-bottom:12px;
  box-sizing:border-box;
}


/* BUTTON */
.user-profile-right button{
  background:#06793f;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:6px;
  cursor:pointer;
  font-size:15px;
  margin-top:10px;
}

.user-profile-right button:hover{
  background:#0455a0;
}

<body>


<div class="user-profile-wrapper">

    <!-- LEFT SIDE -->
    <div class="user-profile-left">
        <img src="picture/Logo3470-health3-removebg-preview.png" class="user-profile-company-logo">
        <h2>Welcome to 3470 Healthcare</h2>
        <p>Manage and update your personal details and enrolled course information.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="user-profile-right">

        <h2>Update Profile</h2>

        <form id="profileForm" class="user-profileForm">

            <div class="user-profile-photo">
                <img src="images/user.png" id="preview">
                <input type="file" id="photo">
            </div>

            <label>Name</label>
            <input type="text" id="name">

            <label>Gender</label>
            <select id="gender">
                <option>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <label>Email ID</label>
            <input type="email" id="email" readonly>

            <label>Mobile No</label>
            <input type="text" id="phone">

            <label>Location</label>
            <input type="text" id="location">

            <label>Course Enrolled</label>
            <select id="course">
                <option>Select Course</option>
                <option>Medical Coding</option>
                <option>CPC Certification</option>
                <option>Healthcare Analytics</option>
            </select>

            <button type="submit">Update Profile</button>

        </form>

    </div>

</div>











  <!-- Javascript -->
  <script src="config.js" defer></script>
