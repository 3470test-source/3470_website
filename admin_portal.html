<!-- Header Profile Id  -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const loggedUser = localStorage.getItem("loggedUser");

    if (loggedUser) {
        document.getElementById("username").textContent = loggedUser;
    } else {
        document.getElementById("username").textContent = "Admin";
    }

});
</script>


   
















<script>
  async function loadUsers() {

  try {

    console.log("Loading users...");

    const response = await fetch("http://localhost:3000/admin/users");

    console.log("Response Status:", response.status);

    const users = await response.json();

    console.log("Users:", users);

    document.getElementById("totalStudents").textContent = users.length;

    document.getElementById("activeStudents").textContent = users.filter(user => user.status === "active").length;

    document.getElementById("disabledStudents").textContent = users.filter(user => user.status === "disabled").length;

    let html = "";

    users.forEach(user => {

      html += `
      <tr>
        <td>${user.id}</td>
        <td>${user.name}</td>
        <td>${user.email}</td>

        <td>
          ${
            user.status === "active"
              ? '<span class="active-badge">Active</span>'
              : '<span class="disabled-badge">Disabled</span>'
          }
        </td>

        <td>
          ${
            user.status === "active"
              ? `<button class="disable-btn" onclick="disableUser(${user.id})">Disable</button>`
              : `<button class="enable-btn" onclick="enableUser(${user.id})">Enable</button>`
          }
        </td>
      </tr>
      `;
    });

    document.getElementById("userTable").innerHTML = html;

  } catch(error) {

    console.error("Load Users Error:", error);

  }

}

loadUsers();
</script>







<script>
  async function disableUser(id){

  if(!confirm("Disable Student?"))
    return;

  await fetch(
    `http://localhost:3000/admin/users/${id}/disable`,
    {
      method:"PUT"
    }
  );

  loadUsers();
}
</script>


<script>
  async function enableUser(id){

  if(!confirm("Enable Student?"))
    return;

  await fetch(
    `http://localhost:3000/admin/users/${id}/enable`,
    {
      method:"PUT"
    }
  );

  loadUsers();
}
</script>
