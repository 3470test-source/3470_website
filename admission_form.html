<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3470 Healthcare & Medical Coding Training Institute | Admission Form</title>

    <!-- Favicon -->
    <link rel="icon" href="picture/Logo3470-health3 (2).jpg" type="image/x-icon">
    
    <link rel="stylesheet" href="styles.css" />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <style>

    * {
      box-sizing: border-box;
      font-family:initial;
    }

    body {
      margin: 0;
      min-height: 100vh;
     background: linear-gradient(135deg, #8bd1f0, #356f83);
      display: flex;
      justify-content: center;
      align-items: center;  
    }





                              /* ----------------- Admission form -- user fill -------------------- */

                           
.admission-form-std {
  max-width: 1000px;
  display: flex;
  align-items: center;
  background: #c7d4cc;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); 
  width: 100%;
  margin: 20px;
  margin: 20px auto;
  padding: 20px;
  gap: 20px;
}

.admission-logo {
  flex: 1;
  text-align: center;
}

.admission-logo img {
  width: 220px;
  max-width: 100%;
}

.admission-logo h3 {
  font-size: 22px;
  color: #333;
  margin-bottom: 10px;
}

.admission-logo p {
  color: #555;
  font-size: 18px;
  margin-top: 20px;
}

.admission-container-enquiry {
  flex: 1;
  background: #fff;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

.admission-container-enquiry h2 {
  text-align: center;
  color: #078b33;
}

.admissionForm-std-3470 label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
  color: #0f53ac;
}

.admissionForm-std-3470 input,
.admissionForm-std-3470 select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  background-color: #f1f5f3;
  border: 1px solid #2ecc71;
}

.admissionForm-std-3470 textarea {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border: 1px solid #2ecc71;
  background-color: #f1f5f3;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

.admissionForm-std-3470 textarea {
  resize: none;
  height: 80px;
}

.admissionForm-std-3470 button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: #039734;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

.admissionForm-std-3470 button:hover {
  background-color: rgb(6, 89, 167);
}

#admission-enquiry-btn {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}

                                         /*------ Responsive Size - Admission Size ------*/


/* ========================= */
/* 📱 MOBILE (320px - 480px) */
/* ========================= */
@media (max-width: 480px) {
  .admission-form-std {
    flex-direction: column;
    padding: 15px;
    gap: 15px;
  }

  .admission-logo img {
    width: 140px;
  }

  .admission-logo h3 {
    font-size: 18px;
  }

  .admission-logo p {
    font-size: 14px;
  }

  .admission-container-enquiry {
    padding: 15px;
  }

  .admissionForm-std-3470 button {
    font-size: 14px;
    padding: 10px;
  }
}

/* ========================= */
/* 📱 LARGE MOBILE (481–767px) */
/* ========================= */
@media (min-width: 481px) and (max-width: 767px) {
  .admission-form-std {
    flex-direction: column;
  }

  .admission-logo img {
    width: 160px;
  }
}

/* ========================= */
/* 📟 TABLET (768px - 1024px) */
/* ========================= */
@media (min-width: 768px) and (max-width: 1024px) {
  .admission-form-std {
    flex-direction: column;
    padding: 20px;
  }

  .admission-logo {
    margin-bottom: 10px;
  }

  .admission-logo img {
    width: 180px;
  }
}

/* ========================= */
/* 💻 SMALL DESKTOP (1025–1366px) */
/* ========================= */
@media (min-width: 1025px) and (max-width: 1366px) {
  .admission-form-std {
    max-width: 1000px;
  }
}

/* ========================= */
/* 🖥 LARGE DESKTOP (1367px+) */
/* ========================= */
@media (min-width: 1367px) {
  .admission-form-std {
    max-width: 1200px;
  }
}


/* ------------------------------------------------------------------------------------------------------------------------------------- */


    </style>

</head>
<body>

<div class="admission-form-std">

    <!-- LEFT: Logo -->
    <div class="admission-logo">
        <img src="picture/Logo3470-health3-removebg-preview.png" alt="Institute Logo">
        <h3>Medical Coding Training – Admission Form</h3>
        <p>📞 For quick response call: 9884606146</p>
    </div>

    <!-- Right: Form -->
<div class="admission-container-enquiry">
    <h2>Admission Form</h2>

    <form id="admissionForm-std-3470" class="admissionForm-std-3470">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email ID</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Mobile Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">

        <label>Qualification</label>
        <select id="qualification">
            <option value="">-- Select Qualification --</option>
            <option value="B.Pharmacy">B.Pharmacy</option>
            <option value="D.Pharmacy">D.Pharmacy</option>
            <option value="B.SC Life science">B.SC Life science</option>
            <option value="Nursing">Nursing</option>
            <option value="Bio technology">Bio technology</option>
            <option value="Medical">Medical</option>
            <option value="Other">Other</option>
        </select>

        <label>Are you a life Science Graduate</label>
        <select id="life-Science-Graduate">
            <option value="">-- Select --</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Preferred Training Mode</label>
        <select id="Training-Mode">
            <option value="">-- Select Mode --</option>
            <option value="Online">Online</option>
            <option value="Offline (Trichy)">Offline - (Trichy)</option>
        </select>

        <label>When do you want to join?</label>
        <select id="join">
            <option value="">-- Select --</option>
            <option value="Immediately">Immediately</option>
            <option value="Within 1 Month">Within 1 Month</option>
            <option value="Just Enquiring">Just Enquiring</option>
        </select>

        <label>Do you need Job Placement?</label>
        <select id="Job-Placement">
            <option value="">-- Select --</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Just Enquiring">Just Enquiring</option>
        </select>

        <label>Your Requirement</label>
        <textarea id="message" type="text" name="message" placeholder="Enter your requirement"></textarea>

        <button type="submit">Submit Enquiry</button>
    </form>

    <p id="admission-enquiry-btn"></p>
</div>

</div>

<script src="main.js"></script>

<script>
document.getElementById("admissionForm-std-3470").addEventListener("submit", function (e) {
    e.preventDefault();

    let data = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        qualification: document.getElementById("qualification").value,
        lifeScience: document.getElementById("life-Science-Graduate").value,
        trainingMode: document.getElementById("Training-Mode").value,
        join: document.getElementById("join").value,
        jobPlacement: document.getElementById("Job-Placement").value,
        message: document.getElementById("message").value.trim()
    };

    let messageBox = document.getElementById("admission-enquiry-btn");

    // Validation
    if (Object.values(data).some(val => val === "")) {
        messageBox.style.color = "red";
        messageBox.textContent = "Please fill all fields!";
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbyH2JrYZxaZMpG89vqRKgn-tNDicU_oM9V0XauSQjYPadFxoAw1KvFqSiyoeWzEbJ5N/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(response => {
        console.log(response);

        messageBox.style.color = "green";
        messageBox.textContent =
           "Your enquiry has been submitted successfully! Our team will call you shortly.";

        document.getElementById("admissionForm-std-3470").reset();

        setTimeout(() => {
            messageBox.textContent = "";
        }, 4000);
    })
    .catch(error => {
        messageBox.style.color = "red";
        messageBox.textContent = "Error submitting form.";
        console.error(error);
    });
});
</script>

</body>
</html>
