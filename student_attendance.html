<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3470 Healthcare & Medical Coding Training Institute | Website Host</title>

    <!-- Favicon -->
    <link rel="icon" href="picture/Logo3470-health3 (2).jpg" type="image/x-icon">
    
    <link rel="stylesheet" href="styles.css" />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>

    * {
      box-sizing: border-box;
      font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }

    body {
      margin: 0;
      font-family: Arial;
    }

</style>

</head>
<body>        

<div class="attendance-main-container">

    <!-- LEFT SIDE - LOGO -->
    <div class="attendance-left-section">
        <img src="picture/Logo3470-health3-removebg-preview.png" alt="Company Logo">
        <h2>3470Healthcare &<br>Medical Coding Training Institute</h2>
    </div>

    <!-- RIGHT SIDE - FORM -->
    <div class="attendance-right-section">
        <h2>Student Attendance</h2>

        <form id="attendanceForm">
            <div class="attendance-form-group">
                <label>Full Name</label>
                <input type="text" required>
            </div>

            <!-- Contact Number -->
            <div class="attendance-form-group">
                <label>Contact No</label>
                <input type="tel" pattern="[0-9]{10}" maxlength="10" placeholder="Enter 10 digit number" required>
            </div>

            <!-- Emergency Number -->
            <div class="attendance-form-group">
                <label>Emergency No</label>
                <input type="tel" pattern="[0-9]{10}" maxlength="10" placeholder="Enter Emergency number" required>
            </div>

            <div class="attendance-form-group">
                <label>Course</label>
                <select id="Attendance-course" required>
                    <option>Select Course</option>
                    <option value="BMCT">BMCT - Basic Medical Coding Training</option>
                    <option value="AMCT">AMCT - Advanced Medical Coding Training</option>
                    <option value="CPC">CPC - Certified Professional Coder</option>
                    <option value="CPMA">CPMA - Certified Professional Medical Auditor</option>
                    <option value="CRC">CRC - Certified Risk Adjustment Coder</option>
                    <option value="CCS">CCS - Certified Coding Specialist</option>
                    <option value="ED">ED - Emergency Dearptment</option>
                    <option value="E&M">E&M - Evaluation & Management</option>
                    <option value="IPDRG">IPDRG - Inpatient Diagnosis-Related Group</option>
                    <option value="IVR">IVR - Interventional Radiology</option>
                    <option value="Surgery">Surgery</option>
                </select>
            </div>

            <div class="attendance-form-group">
                <label>Batch</label>
                <select id="Attendance-batch" required>
                  <option>Select Batch</option>
                </select>
            </div>

            <div class="attendance-form-group">
                <label>Time</label>
                <select id="Attendance-time" required>
                    <option>Select Time</option>
                </select>
            </div>

            <div class="attendance-form-group">
                <label>Attendance Status</label>
                <select required>
                    <option>Select Status</option>
                    <option value="Present" selected>Present</option>
                    <!-- <option value="Absent">Absent</option> -->
                </select>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

</div>

<script src="main.js"></script>


<script>

const courseSelect = document.getElementById("Attendance-course");
const batchSelect = document.getElementById("Attendance-batch");
const timeSelect = document.getElementById("Attendance-time");

courseSelect.addEventListener("change", function () {

const courseValue = this.value;

/*---- reset batch ----*/

batchSelect.innerHTML = '<option value="">Select Batch</option>';
timeSelect.innerHTML = '<option value="">Select Time</option>';

/*---------- BMCT Course -----------*/

if(courseValue  === "BMCT"){

batchSelect.innerHTML += `
<option value="Morning weekday">Weekdays Morning</option>
<option value="Weekdays Afternoon">Weekdays Afternoon</option>
<option value="Evening weekday">Weekdays Evening</option>
<option value="Morning weekend">Weekend Morning</option>
`;

}

/*---------- CPC Course -----------*/

else if(courseValue === "CPC"){

batchSelect.innerHTML += `
<option value="Morning weekday">Weekdays Morning</option>
<option value="Evening weekday">Weekdays Evening</option>
<option value="Morning weekend">Weekend Morning</option>
`;

}

/*---------- Surgery Course -----------*/

else if(courseValue === "Surgery"){

batchSelect.innerHTML += `
<option value="Evening weekday">Weekdays Evening</option>
<option value="Morning weekend">Weekend Morning</option>
`;

}


/*---------- IPDRG Course -----------*/

else if(courseValue === "IPDRG"){

batchSelect.innerHTML += `
<option value="Evening weekday">Weekdays Evening</option>
<option value="Morning weekend">Weekend Morning</option>
`;

}

/*---------- E&M Course -----------*/

else if(courseValue === "E&M"){

batchSelect.innerHTML += `
<option value="Morning weekend">Weekend Morning</option>
`;

}

/*---------- CPMA Course -----------*/

else if(courseValue === "CPMA"){

batchSelect.innerHTML += `
<option value="Evening weekend">Weekend Evening</option>
`;

}

/*---------- CPMA Course -----------*/

else if(courseValue === "IVR"){

batchSelect.innerHTML += `
<option value="Evening weekday">Weekdays Evening</option>
`;

}

/*---------- CCS Course -----------*/

else if(courseValue === "CCS"){

batchSelect.innerHTML += `
<option value="Evening weekday">Weekdays Evening</option>
`;

}

});




/*------- Batch → Time ---------*/

batchSelect.addEventListener("change", function () {

const batchValue = this.value;
const courseValue = courseSelect.value;

timeSelect.innerHTML = '<option value="">Select Time</option>';

/*---------- CPC Course -----------*/

if (courseValue === "CPC" && batchValue === "Morning weekday") {
timeSelect.innerHTML += '<option value="7am to 9:30am">7.00am to 9.30am</option>';
}

else if (courseValue === "CPC" && batchValue === "Evening weekday") {
timeSelect.innerHTML += '<option value="6pm to 8:30pm">6.00pm to 8.30pm</option>';
}

else if (courseValue === "CPC" && batchValue === "Morning weekend") {
timeSelect.innerHTML += '<option value="9am to 1:30pm">9.00am to 1.30pm</option>';
}


/*---------- BMCT Course -----------*/

if (courseValue === "BMCT" && batchValue === "Morning weekday") {
timeSelect.innerHTML += '<option value="9.30am to 12:30pm">9.30am to 12.30pm</option>';
}

else if (courseValue === "BMCT" && batchValue === "Weekdays Afternoon") {
timeSelect.innerHTML += '<option value="2pm to 5pm">2.00pm to 5.00pm</option>';
}

else if (courseValue === "BMCT" && batchValue === "Evening weekday") {
timeSelect.innerHTML += '<option value="6pm to 8pm">6.00pm to 8.00pm</option>';
}

else if (courseValue === "BMCT" && batchValue === "Morning weekend") {
timeSelect.innerHTML += '<option value="9am to 5pm">9.00am to 5.00pm</option>';
}


/*---------- Surgery Course -----------*/

else if (courseValue === "Surgery" && batchValue === "Evening weekday") {
timeSelect.innerHTML += '<option value="6pm to 8pm">6.00pm to 8.00pm</option>';
}

else if (courseValue === "Surgery" && batchValue === "Morning weekend") {
timeSelect.innerHTML += '<option value="9.30am to 4pm">9.30am to 4.00pm</option>';
}


/*---------- IPDRG Course -----------*/

else if (courseValue === "IPDRG" && batchValue === "Evening weekday") {
timeSelect.innerHTML += '<option value="7pm to 9pm">7.00pm to 9.00pm</option>';
}

else if (courseValue === "IPDRG" && batchValue === "Morning weekend") {
timeSelect.innerHTML += '<option value="10am to 1.30pm">10.00am to 1.30pm</option>';
}


/*---------- E&M Course -----------*/

else if (courseValue === "E&M" && batchValue === "Morning weekend") {
timeSelect.innerHTML += '<option value="10am to 1pm">10.00am to 1.00pm</option>';
}


/*---------- CPMA Course -----------*/

else if (courseValue === "CPMA" && batchValue === "Evening weekend") {
timeSelect.innerHTML += '<option value="3pm to 5pm">3.00pm to 5.00pm</option>';
}

/*---------- IVR Course -----------*/

else if (courseValue === "IVR" && batchValue === "Evening weekday") {
timeSelect.innerHTML += '<option value="6pm to 8pm">6.00pm to 8.00pm</option>';
}

/*---------- CCS Course -----------*/

else if (courseValue === "CCS" && batchValue === "Evening weekday") {
timeSelect.innerHTML += '<option value="7pm to 9pm">7.00pm to 9.00pm</option>';
}


});

</script>

<!-- Google Sheet Data  -->
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyJD8iO_cjE9ZBeORf2chI7zNjrj8gUN4aPPWLNb0FGwxsLr7zjdKOnTGE_dwrCaLlWIA/exec";
const form = document.getElementById("attendanceForm");

form.addEventListener("submit", e => {
    e.preventDefault();

    const formData = {
        fullName: form.querySelector('input[type="text"]').value,
        contactNo: form.querySelectorAll('input[type="tel"]')[0].value,
        emergencyNo: form.querySelectorAll('input[type="tel"]')[1].value,
        course: form.querySelectorAll('select')[0].value,
        batch: document.getElementById("Attendance-batch").value,
        time: document.getElementById("Attendance-time").value,
        status: form.querySelectorAll('select')[3].value
    };

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(formData)
    })
    .then(response => {
        alert("Attendance Saved Successfully ✅");
        form.reset();   // ✅ This clears the form
        timeSelect.innerHTML = '<option value="">Select Time</option>'; // reset time dropdown
    })
    .catch(error => alert("Error!"));
});
</script>

</body>
</html>
