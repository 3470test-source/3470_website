
<!DOCTYPE html>

<head>

  <style>
    body {
      margin: 0;

    }

      margin: 20px auto;

 /*--- OTP popup Box ---*/

  position:fixed;

  </style>
</head>

<body oncontextmenu="return false" class="no-right-click-3470">


<!-- Otp popup Box -->

<div id="otpModal" class="otpModal">
  <div id="otpBox" class="otpBox">
   <h3>🔐 Secure Document Access</h3>
   <p>Enter the OTP provided by the administrator to view this document.</p>
  <input type="text" id="otp" placeholder="Enter OTP">

<br><br>

   <button onclick="submitOtp()">Submit</button>
  </div>
</div>

<iframe id="pdfFrame" style="display:none;"></iframe>


<!-- Javascript -->
<script src="config.js" defer></script>
<script src="main.js" defer></script>

<!-- Load PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
  // REQUIRED: worker file path
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // Get PDF from URL
  const params = new URLSearchParams(window.location.search);
  const pdfUrl = params.get("file");

  if (!pdfUrl) {
    alert("PDF not found");
  }

  // Load PDF
  pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

      pdf.getPage(pageNum).then(page => {

        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        document.body.appendChild(canvas);

        page.render({
          canvasContext: context,
          viewport: viewport
        });

      });
    }

  });

  // Disable right click
  document.addEventListener("contextmenu", e => e.preventDefault());

  // Disable Ctrl shortcuts
  document.addEventListener("keydown", e => {
    if (e.ctrlKey && ['s', 'p', 'u'].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });






    //--------- OTP Popup -----------

// const params = new URLSearchParams(window.location.search)
const file = decodeURIComponent(params.get("file"))

if(!file){

alert("Invalid PDF")
throw new Error("No file")

}

/* ====================
CHECK TOKEN
==================== */

const expiry = Number(localStorage.getItem("pdfExpiry"))
const token = localStorage.getItem("pdfToken")

if(expiry && Date.now() < expiry && token){

fetch("http://localhost:3000/api/pdf/check-token?token="+token+"&file="+encodeURIComponent(file))

.then(res=>res.json())

.then(data=>{

if(data.valid){

loadPdf(token)

}else{

localStorage.removeItem("pdfToken")
localStorage.removeItem("pdfExpiry")
generateOtp()

}

})

}else{

generateOtp()

}

/* ====================
GENERATE OTP
==================== */

function generateOtp(){

fetch("http://localhost:3000/api/pdf/generate-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({file})

})

}

/* ====================
VERIFY OTP
==================== */

function submitOtp(){

const otp=document.getElementById("otp").value

fetch("http://localhost:3000/api/pdf/verify-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({file,otp})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

localStorage.setItem("pdfToken",data.token)
localStorage.setItem("pdfExpiry",data.expiry)

loadPdf(data.token)

}else{

alert(data.message)

}

})

}

/* ====================
LOAD PDF
==================== */

function loadPdf(token){

document.getElementById("otpModal").style.display="none"

document.getElementById("pdfFrame").style.display="block"

document.getElementById("pdfFrame").src =
"http://localhost:3000/api/pdf/stream?file="+encodeURIComponent(file)+"&token="+token

}

</script>

</body>
</html>
