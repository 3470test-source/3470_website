<!DOCTYPE html>
<html>
<head>
<title>Secure PDF Viewer</title>

<style>
#otpModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
}

#otpBox{
background:white;
padding:20px;
}
</style>
</head>

<body>

<div id="otpModal">
<div id="otpBox">
<h3>Enter OTP</h3>
<input type="text" id="otp">
<button onclick="submitOtp()">Submit</button>
</div>
</div>

<iframe id="pdfFrame" width="100%" height="800px" style="display:none;"></iframe>







<script>

const params = new URLSearchParams(window.location.search);
const file = decodeURIComponent(params.get("file"));


if(!file){
alert("Invalid PDF link");
throw new Error("No file provided");
}


fetch("http://localhost:3000/api/pdf/generate-otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({file})
});

function submitOtp(){

const otp=document.getElementById("otp").value;

fetch("http://localhost:3000/api/pdf/verify-otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({file,otp})
})
.then(res=>res.json())
.then(data=>{

if(data.success){

document.getElementById("otpModal").style.display="none";

document.getElementById("pdfFrame").src=file;

}else{

alert(data.message || "Invalid OTP");

}

});

}

</script>




</body>
</html>
